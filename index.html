<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft World Map – Zone Stats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

  #header {
    background: #16213e;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  #header h1 { font-size: 15px; font-weight: 600; color: #e94560; letter-spacing: 1px; white-space: nowrap; }

  .btn-group { display: flex; gap: 4px; }
  .stat-btn {
    padding: 5px 12px;
    border: 1px solid #0f3460;
    background: #0f3460;
    color: #aaa;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .stat-btn:hover { background: #1a4a8a; color: #fff; }
  .stat-btn.active { background: #e94560; border-color: #e94560; color: #fff; }

  #score-toggles {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    background: #0a2240;
    border: 1px solid #0f3460;
    border-radius: 4px;
    font-size: 11px;
  }
  #score-toggles .toggle-label { color: #555; margin-right: 2px; }
  #score-toggles label { display: flex; align-items: center; gap: 4px; cursor: pointer; color: #aaa; user-select: none; }
  #score-toggles input[type=checkbox] { accent-color: #e94560; cursor: pointer; }
  #score-toggles input:checked + span { color: #fff; font-weight: 600; }

  #upload-btn {
    padding: 5px 10px;
    border: 1px solid #555;
    background: #222;
    color: #aaa;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    white-space: nowrap;
  }
  #upload-btn:hover { background: #333; color: #fff; }
  #file-input { display: none; }

  #legend {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    font-size: 11px;
    color: #aaa;
    white-space: nowrap;
  }
  #gradient-bar { width: 120px; height: 14px; border-radius: 3px; border: 1px solid #333; }

  #info-bar {
    background: #0f3460;
    padding: 3px 16px;
    font-size: 11px;
    color: #aaa;
    flex-shrink: 0;
    display: flex;
    gap: 16px;
  }

  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: grab;
  }
  #canvas-wrap.grabbing { cursor: grabbing; }
  canvas { position: absolute; top: 0; left: 0; image-rendering: pixelated; }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15,20,40,0.85);
    font-size: 14px;
    color: #aaa;
    z-index: 10;
  }

  #tooltip {
    position: fixed;
    background: rgba(22,33,62,0.97);
    border: 1px solid #e94560;
    border-radius: 6px;
    padding: 10px 13px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    z-index: 100;
    min-width: 200px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    line-height: 1.7;
  }
  #tooltip .tip-title { font-weight: 700; color: #e94560; margin-bottom: 4px; font-size: 13px; }
  #tooltip .tip-biome { color: #aaa; font-size: 11px; margin-bottom: 6px; }
  #tooltip .tip-row { display: flex; justify-content: space-between; gap: 16px; }
  #tooltip .tip-label { color: #aaa; }
  #tooltip .tip-val { font-weight: 600; color: #fff; }
  #tooltip .tip-val.highlight { color: #ffd700; }

  #reset-btn {
    padding: 5px 10px;
    border: 1px solid #555;
    background: #222;
    color: #aaa;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
  }
  #reset-btn:hover { background: #333; color: #fff; }
</style>
</head>
<body>

<div id="header">
  <h1>&#9935; WORLD MAP</h1>
  <div class="btn-group">
    <button class="stat-btn active" data-stat="score">&#11088; Score</button>
    <button class="stat-btn" data-stat="hammers">&#128296; Hammers</button>
    <button class="stat-btn" data-stat="beakers">&#128300; Beakers</button>
    <button class="stat-btn" data-stat="growth">&#127806; Growth</button>
    <button class="stat-btn" data-stat="happiness">&#128522; Happiness</button>
  </div>
  <div id="score-toggles">
    <span class="toggle-label">include:</span>
    <label><input type="checkbox" data-toggle="hammers" checked><span>&#128296; Hammers</span></label>
    <label><input type="checkbox" data-toggle="beakers" checked><span>&#128300; Beakers</span></label>
    <label><input type="checkbox" data-toggle="growth" checked><span>&#127806; Growth</span></label>
    <label><input type="checkbox" data-toggle="happiness" checked><span>&#128522; Happiness</span></label>
  </div>
  <button id="reset-btn">&#8962; Reset View</button>
  <button id="upload-btn">&#128194; Load JSON</button>
  <input type="file" id="file-input" accept=".json,.txt">
  <div id="legend">
    <span id="legend-min"></span>
    <canvas id="gradient-bar" width="120" height="14"></canvas>
    <span id="legend-max"></span>
  </div>
</div>

<div id="info-bar">
  <span id="coord-display">Loading data...</span>
  <span id="zoom-display">Zoom: 100%</span>
</div>

<div id="canvas-wrap">
  <canvas id="map"></canvas>
  <div id="overlay">Loading data.json…</div>
</div>
<div id="tooltip"></div>

<script>
const STAT_KEYS = ['hammers','beakers','growth','happiness'];
const CELL = 6;

let RAW = [], grid = [], ranges = {};
let COLS = 0, ROWS = 0, X_MIN = 0, Z_MIN = 0, STEP = 160;
let offsetX = 0, offsetY = 0, scale = 1;
let currentStat = 'score';
let dragging = false, dragStartX, dragStartY, dragOffX, dragOffY;

const wrap    = document.getElementById('canvas-wrap');
const canvas  = document.getElementById('map');
const ctx     = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const overlay = document.getElementById('overlay');
const coordDisplay = document.getElementById('coord-display');

// ── Color scale ──────────────────────────────────────────────────────────────
function heatColor(t) {
  const stops = [
    [0,    [120, 20,  20]],
    [0.25, [200, 80,  0]],
    [0.5,  [220, 200, 0]],
    [0.75, [80,  180, 40]],
    [1.0,  [0,   120, 20]],
  ];
  let i = 0;
  while (i < stops.length - 2 && t > stops[i+1][0]) i++;
  const [t0, c0] = stops[i], [t1, c1] = stops[i+1];
  const f = (t - t0) / (t1 - t0);
  return c0.map((v, j) => Math.round(v + f * (c1[j] - v)));
}

// Draw gradient legend bar (once)
const gradCtx = document.getElementById('gradient-bar').getContext('2d');
const grd = gradCtx.createLinearGradient(0, 0, 120, 0);
for (let i = 0; i <= 10; i++) {
  const [r,g,b] = heatColor(i/10);
  grd.addColorStop(i/10, `rgb(${r},${g},${b})`);
}
gradCtx.fillStyle = grd;
gradCtx.fillRect(0, 0, 120, 14);

// ── Data init ─────────────────────────────────────────────────────────────────
function initData(data) {
  RAW = data;

  const xs = [...new Set(data.map(z => z.x))].sort((a,b) => a-b);
  const zs = [...new Set(data.map(z => z.z))].sort((a,b) => a-b);
  COLS  = xs.length;
  ROWS  = zs.length;
  X_MIN = xs[0];
  Z_MIN = zs[0];
  STEP  = xs.length > 1 ? xs[1] - xs[0] : 160;

  grid = new Array(COLS * ROWS).fill(null);
  for (const z of RAW) {
    const col = Math.round((z.x - X_MIN) / STEP);
    const row = Math.round((z.z - Z_MIN) / STEP);
    if (col >= 0 && col < COLS && row >= 0 && row < ROWS)
      grid[row * COLS + col] = z;
  }

  for (const s of STAT_KEYS) {
    const vals = RAW.map(z => z[s]);
    ranges[s] = { min: Math.min(...vals), max: Math.max(...vals) };
  }
  ranges['score'] = { min: 0, max: 1 };

  computeScores();
  centerView();
  updateLegend();
  overlay.style.display = 'none';
  coordDisplay.textContent = 'Hover over a zone to see details';
  resize();
}

// ── Score ─────────────────────────────────────────────────────────────────────
function computeScores() {
  const active = STAT_KEYS.filter(s => {
    const cb = document.querySelector(`input[data-toggle="${s}"]`);
    return cb ? cb.checked : true;
  });
  const count = active.length || 1;
  for (const z of RAW) {
    z._score = active.reduce((sum, s) =>
      sum + (z[s] - ranges[s].min) / (ranges[s].max - ranges[s].min), 0) / count;
  }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function getNorm(zone) {
  if (currentStat === 'score') return zone._score;
  const r = ranges[currentStat];
  return (zone[currentStat] - r.min) / (r.max - r.min);
}

function draw() {
  if (!RAW.length) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cs = CELL * scale;
  const gap = Math.max(0.5, scale * 0.5);
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const zone = grid[row * COLS + col];
      if (!zone) continue;
      const px = col * cs + offsetX;
      const py = row * cs + offsetY;
      if (px + cs < 0 || py + cs < 0 || px > canvas.width || py > canvas.height) continue;
      const [r,g,b] = heatColor(getNorm(zone));
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(px + gap, py + gap, cs - gap*2, cs - gap*2);
    }
  }
  // Origin crosshair
  const ox = Math.round((0 - X_MIN) / STEP) * cs + offsetX;
  const oy = Math.round((0 - Z_MIN) / STEP) * cs + offsetY;
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(ox, 0); ctx.lineTo(ox, canvas.height); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, oy); ctx.lineTo(canvas.width, oy); ctx.stroke();
  ctx.setLineDash([]);
}

function centerView() {
  const mapW = COLS * CELL, mapH = ROWS * CELL;
  scale = Math.min(wrap.clientWidth / mapW, wrap.clientHeight / mapH) * 0.95;
  offsetX = (wrap.clientWidth  - mapW * scale) / 2;
  offsetY = (wrap.clientHeight - mapH * scale) / 2;
}

function resize() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  draw();
}

function updateLegend() {
  if (currentStat === 'score') {
    document.getElementById('legend-min').textContent = '0%';
    document.getElementById('legend-max').textContent = '100%';
  } else {
    const r = ranges[currentStat];
    document.getElementById('legend-min').textContent = r.min;
    document.getElementById('legend-max').textContent = r.max;
  }
}

// ── Pan / Zoom ─────────────────────────────────────────────────────────────────
wrap.addEventListener('mousedown', e => {
  dragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragOffX = offsetX;     dragOffY = offsetY;
  wrap.classList.add('grabbing');
});
window.addEventListener('mouseup',   () => { dragging = false; wrap.classList.remove('grabbing'); });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  offsetX = dragOffX + e.clientX - dragStartX;
  offsetY = dragOffY + e.clientY - dragStartY;
  draw();
});
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.12 : 0.89;
  offsetX = mx - (mx - offsetX) * factor;
  offsetY = my - (my - offsetY) * factor;
  scale = Math.max(0.3, Math.min(20, scale * factor));
  const base = Math.min(wrap.clientWidth / (COLS*CELL), wrap.clientHeight / (ROWS*CELL)) * 0.95;
  document.getElementById('zoom-display').textContent = `Zoom: ${Math.round(scale / base * 100)}%`;
  draw();
}, { passive: false });

// ── Tooltip ────────────────────────────────────────────────────────────────────
wrap.addEventListener('mousemove', e => {
  if (dragging || !RAW.length) return;
  const rect = wrap.getBoundingClientRect();
  const cs   = CELL * scale;
  const col  = Math.floor((e.clientX - rect.left  - offsetX) / cs);
  const row  = Math.floor((e.clientY - rect.top   - offsetY) / cs);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) {
    tooltip.style.display = 'none';
    coordDisplay.textContent = 'Hover over a zone to see details';
    return;
  }
  const zone = grid[row * COLS + col];
  if (!zone) { tooltip.style.display = 'none'; return; }

  const score  = (zone._score * 100).toFixed(1);
  const statVal = currentStat === 'score' ? score + '%' : zone[currentStat];
  coordDisplay.textContent = `Zone (${zone.x}, ${zone.z})  |  ID: ${zone.id}  |  ${currentStat}: ${statVal}`;

  const hl = s => currentStat === s ? 'highlight' : '';
  tooltip.innerHTML =
    `<div class="tip-title">Zone ${zone.id}</div>` +
    `<div class="tip-biome">${zone.biomes}</div>` +
    `<div class="tip-row"><span class="tip-label">Coordinates</span><span class="tip-val">(${zone.x}, ${zone.z})</span></div>` +
    `<div class="tip-row"><span class="tip-label">Score</span><span class="tip-val highlight">${score}%</span></div>` +
    `<div class="tip-row"><span class="tip-label">Hammers</span><span class="tip-val ${hl('hammers')}">${zone.hammers}</span></div>` +
    `<div class="tip-row"><span class="tip-label">Beakers</span><span class="tip-val ${hl('beakers')}">${zone.beakers}</span></div>` +
    `<div class="tip-row"><span class="tip-label">Growth</span><span class="tip-val ${hl('growth')}">${zone.growth}</span></div>` +
    `<div class="tip-row"><span class="tip-label">Happiness</span><span class="tip-val ${hl('happiness')}">${zone.happiness}</span></div>`;

  tooltip.style.display = 'block';
  let tx = e.clientX + 16, ty = e.clientY - 10;
  if (tx + 220 > window.innerWidth)  tx = e.clientX - 230;
  if (ty + 200 > window.innerHeight) ty = window.innerHeight - 210;
  tooltip.style.left = tx + 'px';
  tooltip.style.top  = ty + 'px';
});
wrap.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

// ── Stat buttons ───────────────────────────────────────────────────────────────
document.querySelectorAll('.stat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStat = btn.dataset.stat;
    document.getElementById('score-toggles').style.display = currentStat === 'score' ? 'flex' : 'none';
    updateLegend();
    draw();
  });
});

// ── Score toggles ──────────────────────────────────────────────────────────────
document.querySelectorAll('#score-toggles input[type=checkbox]').forEach(cb => {
  cb.addEventListener('change', () => {
    const any = [...document.querySelectorAll('#score-toggles input')].some(c => c.checked);
    if (!any) { cb.checked = true; return; }
    computeScores();
    draw();
  });
});

// ── Reset ──────────────────────────────────────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click', () => {
  centerView();
  document.getElementById('zoom-display').textContent = 'Zoom: 100%';
  draw();
});

// ── File upload ────────────────────────────────────────────────────────────────
document.getElementById('upload-btn').addEventListener('click', () => {
  document.getElementById('file-input').click();
});
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  overlay.textContent = `Loading ${file.name}…`;
  overlay.style.display = 'flex';
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      let text = ev.target.result;
      // strip trailing non-JSON garbage (e.g. "debugger eval code:...")
      const end = text.lastIndexOf(']');
      if (end !== -1) text = text.slice(0, end + 1);
      const data = JSON.parse(text);
      initData(data);
    } catch(err) {
      overlay.textContent = 'Error: ' + err.message;
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ── Boot: fetch data.json ──────────────────────────────────────────────────────
window.addEventListener('resize', resize);
canvas.width  = wrap.clientWidth;
canvas.height = wrap.clientHeight;

fetch('data.json')
  .then(r => { if (!r.ok) throw new Error('data.json not found'); return r.json(); })
  .then(data => initData(data))
  .catch(err => {
    overlay.textContent = 'No data.json found — use "Load JSON" to open a file.';
  });
</script>
</body>
</html>
