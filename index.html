<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft World Map – Zone Stats</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        #header {
            background: #16213e;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
        }
        #header h1 { font-size: 15px; font-weight: 600; color: #e94560; letter-spacing: 1px; white-space: nowrap; }

        .btn-group { display: flex; gap: 4px; }
        .stat-btn {
            padding: 5px 12px;
            border: 1px solid #0f3460;
            background: #0f3460;
            color: #aaa;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.15s;
        }
        .stat-btn:hover { background: #1a4a8a; color: #fff; }
        .stat-btn.active { background: #e94560; border-color: #e94560; color: #fff; }

        #score-toggles {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px;
            background: #0a2240;
            border: 1px solid #0f3460;
            border-radius: 4px;
            font-size: 11px;
        }
        #score-toggles .toggle-label { color: #555; margin-right: 2px; }
        #score-toggles label { display: flex; align-items: center; gap: 4px; cursor: pointer; color: #aaa; user-select: none; }
        #score-toggles input[type=checkbox] { accent-color: #e94560; cursor: pointer; }
        #score-toggles input:checked + span { color: #fff; font-weight: 600; }

        #upload-btn {
            padding: 5px 10px;
            border: 1px solid #555;
            background: #222;
            color: #aaa;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
        }
        #upload-btn:hover { background: #333; color: #fff; }
        #file-input { display: none; }

        #legend {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            font-size: 11px;
            color: #aaa;
            white-space: nowrap;
        }
        #gradient-bar { width: 120px; height: 14px; border-radius: 3px; border: 1px solid #333; }

        #info-bar {
            background: #0f3460;
            padding: 3px 16px;
            font-size: 11px;
            color: #aaa;
            flex-shrink: 0;
            display: flex;
            gap: 16px;
        }

        #main-area { flex: 1; display: flex; overflow: hidden; }

        #canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }
        #canvas-wrap.grabbing { cursor: grabbing; }
        canvas { position: absolute; top: 0; left: 0; image-rendering: pixelated; }

        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15,20,40,0.85);
            font-size: 14px;
            color: #aaa;
            z-index: 10;
        }

        #tooltip {
            position: fixed;
            background: rgba(22,33,62,0.97);
            border: 1px solid #e94560;
            border-radius: 6px;
            padding: 10px 13px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 100;
            min-width: 200px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            line-height: 1.7;
        }
        #tooltip .tip-title { font-weight: 700; color: #e94560; margin-bottom: 4px; font-size: 13px; }
        #tooltip .tip-biome { color: #aaa; font-size: 11px; margin-bottom: 6px; }
        #tooltip .tip-row { display: flex; justify-content: space-between; gap: 16px; }
        #tooltip .tip-label { color: #aaa; }
        #tooltip .tip-val { font-weight: 600; color: #fff; }
        #tooltip .tip-val.highlight { color: #ffd700; }

        #reset-btn, #planner-toggle-btn, #trades-toggle-btn {
            padding: 5px 10px;
            border: 1px solid #555;
            background: #222;
            color: #aaa;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
        }
        #reset-btn:hover          { background: #333; color: #fff; }
        #planner-toggle-btn:hover { background: #333; color: #fff; }
        #planner-toggle-btn.active { background: #0f3460; border-color: #e94560; color: #e94560; }
        #trades-toggle-btn:hover  { background: #333; color: #fff; }
        #trades-toggle-btn.active { background: #1a3d20; border-color: #4edfa8; color: #4edfa8; }

        /* ── Civ Planner Panel ─────────────────────────────────────────────── */
        #planner-panel {
            width: 260px;
            flex-shrink: 0;
            border-left: 1px solid #0f3460;
            background: #0d1520;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        #planner-panel.open { display: flex; }

        #planner-top { padding: 10px 12px; border-bottom: 1px solid #0f3460; }
        #planner-top h2 { font-size: 11px; font-weight: 600; color: #e94560; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }

        .p-mode-row { display: flex; gap: 4px; margin-bottom: 8px; }
        .p-mode-btn {
            flex: 1; padding: 5px 0; font-size: 11px; font-weight: 500;
            border: 1px solid #1a2a40; border-radius: 4px; cursor: pointer;
            background: #111d2e; color: #6a8aaa; transition: all .15s;
        }
        .p-mode-btn:hover          { color: #ccc; border-color: #2a3a50; }
        .p-mode-btn.active-capital { background: #0c3a6e; border-color: #1a5fa0; color: #7ec8ff; }
        .p-mode-btn.active-town    { background: #0a3d2e; border-color: #0f6e50; color: #4edfa8; }
        .p-mode-btn.active-remove  { background: #3d0a0a; border-color: #a32d2d; color: #ff7070; }

        .p-cult-row { display: flex; align-items: center; gap: 6px; }
        .p-cult-row label { font-size: 11px; color: #6a8aaa; white-space: nowrap; }
        .p-cult-row select {
            flex: 1; font-size: 11px; padding: 4px 5px;
            border: 1px solid #1a2a40; border-radius: 4px;
            background: #111d2e; color: #e0e0e0; outline: none; cursor: pointer;
        }

        #town-list { flex: 1; overflow-y: auto; padding: 6px; }
        #town-list::-webkit-scrollbar { width: 3px; }
        #town-list::-webkit-scrollbar-thumb { background: #1a2a40; border-radius: 2px; }

        .town-item {
            display: flex; align-items: flex-start; gap: 6px;
            padding: 6px 8px; border-radius: 4px; border: 1px solid #1a2a40;
            margin-bottom: 4px; background: #111d2e;
        }
        .town-dot    { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
        .town-name   { font-size: 11px; font-weight: 500; color: #ccc; }
        .town-sub    { font-size: 10px; color: #456; margin-top: 1px; }
        .town-remove { cursor: pointer; color: #334; font-size: 13px; line-height: 1; padding: 0 2px; margin-left: auto; flex-shrink: 0; transition: color .1s; }
        .town-remove:hover { color: #ff5555; }

        #planner-stats { padding: 10px 12px; border-top: 1px solid #0f3460; background: #0a1018; }
        #planner-stats h3 { font-size: 10px; font-weight: 600; color: #456; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
        .p-stat-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .p-stat-card  { background: #0d1520; border: 1px solid #1a2a40; border-radius: 4px; padding: 5px 8px; }
        .p-stat-label { font-size: 10px; color: #456; }
        .p-stat-val   { font-size: 14px; font-weight: 600; color: #cde; }

        .p-empty { padding: 14px 10px; font-size: 11px; color: #345; text-align: center; line-height: 1.6; }

        #planner-fg { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

<div id="header">
    <h1>&#9935; WORLD MAP</h1>
    <div class="btn-group">
        <button class="stat-btn active" data-stat="score">&#11088; Score</button>
        <button class="stat-btn" data-stat="hammers">&#128296; Hammers</button>
        <button class="stat-btn" data-stat="beakers">&#128300; Beakers</button>
        <button class="stat-btn" data-stat="growth">&#127806; Growth</button>
        <button class="stat-btn" data-stat="happiness">&#128522; Happiness</button>
    </div>
    <div id="score-toggles">
        <span class="toggle-label">include:</span>
        <label><input type="checkbox" data-toggle="hammers" checked><span>&#128296; Hammers</span></label>
        <label><input type="checkbox" data-toggle="beakers" checked><span>&#128300; Beakers</span></label>
        <label><input type="checkbox" data-toggle="growth" checked><span>&#127806; Growth</span></label>
        <label><input type="checkbox" data-toggle="happiness" checked><span>&#128522; Happiness</span></label>
    </div>
    <button id="reset-btn">&#8962; Reset View</button>
    <div class="btn-group" id="view-mode-group">
        <button class="stat-btn active" data-view="heat">&#127777; Heat Map</button>
        <button class="stat-btn" data-view="image">&#127760; Image</button>
        <button class="stat-btn" data-view="both">&#9678; Both</button>
    </div>
    <div id="opacity-control" style="display:none; align-items:center; gap:6px; font-size:11px; color:#aaa;">
        <span>Opacity:</span>
        <input type="range" id="heat-opacity" min="0" max="100" value="70" style="width:80px; accent-color:#e94560;">
        <span id="opacity-val">70%</span>
    </div>
    <div id="coord-search" style="display:flex; align-items:center; gap:4px;">
        <input type="number" id="search-x" placeholder="X" style="width:70px; padding:4px 6px; background:#111d2e; border:1px solid #1a2a40; border-radius:4px; color:#e0e0e0; font-size:11px;">
        <input type="number" id="search-z" placeholder="Z" style="width:70px; padding:4px 6px; background:#111d2e; border:1px solid #1a2a40; border-radius:4px; color:#e0e0e0; font-size:11px;">
        <button id="search-btn" style="padding:5px 10px; border:1px solid #0f3460; background:#0f3460; color:#aaa; border-radius:4px; cursor:pointer; font-size:11px;">&#128269; Go</button>
    </div>
    <button id="trades-toggle-btn">&#128178; Trades</button>
    <button id="planner-toggle-btn">&#127759; Civ Planner</button>
    <button id="upload-btn">&#128194; Load JSON</button>
    <input type="file" id="file-input" accept=".json,.txt">
    <div id="legend">
        <span id="legend-min"></span>
        <canvas id="gradient-bar" width="120" height="14"></canvas>
        <span id="legend-max"></span>
    </div>
</div>

<div id="info-bar">
    <span id="coord-display">Loading data...</span>
    <span id="zoom-display">Zoom: 100%</span>
</div>

<div id="main-area">
    <div id="canvas-wrap">
        <canvas id="map"></canvas>
        <canvas id="planner-fg"></canvas>
        <div id="overlay">Loading data.json…</div>
    </div>

    <!-- Civ Planner Panel -->
    <div id="planner-panel">
        <div id="planner-top">
            <h2>Civ Planner</h2>
            <div class="p-mode-row">
                <button class="p-mode-btn" id="btn-capital" onclick="setMode('capital')">Capital</button>
                <button class="p-mode-btn" id="btn-town"    onclick="setMode('town')">Town</button>
                <button class="p-mode-btn" id="btn-remove"  onclick="setMode('remove')">Remove</button>
            </div>
            <div class="p-cult-row">
                <label>Culture level</label>
                <select id="cult-select">
                    <option value="1">1 — 1 zone</option>
                    <option value="2">2 — 2 zones</option>
                    <option value="3">3 — 3 zones</option>
                    <option value="4">4 — 4 zones</option>
                    <option value="5">5 — 5 zones</option>
                    <option value="6">6 — 7 zones</option>
                    <option value="7">7 — 9 zones</option>
                    <option value="8">8 — 12 zones</option>
                    <option value="9">9 — 15 zones</option>
                    <option value="10">10 — 18 zones</option>
                    <option value="11">11 — 22 zones</option>
                    <option value="12">12 — 26 zones</option>
                    <option value="13">13 — 30 zones</option>
                    <option value="14">14 — 35 zones</option>
                    <option value="15">15 — 40 zones</option>
                </select>
            </div>
        </div>
        <div id="town-list"><div class="p-empty">Place a capital first,<br>then add towns.</div></div>
        <div id="planner-stats">
            <h3>Total — all towns</h3>
            <div class="p-stat-grid">
                <div class="p-stat-card"><div class="p-stat-label">Hammers</div><div class="p-stat-val" id="s-hammers">—</div></div>
                <div class="p-stat-card"><div class="p-stat-label">Beakers</div><div class="p-stat-val" id="s-beakers">—</div></div>
                <div class="p-stat-card"><div class="p-stat-label">Growth</div><div class="p-stat-val" id="s-growth">—</div></div>
                <div class="p-stat-card"><div class="p-stat-label">Happiness</div><div class="p-stat-val" id="s-happiness">—</div></div>
            </div>
            <button id="export-btn" style="margin-top:8px;width:100%;padding:5px 0;font-size:11px;border:1px solid #1a2a40;background:#111d2e;color:#6a8aaa;border-radius:4px;cursor:pointer;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#6a8aaa'">&#128196; Export</button>
            <button id="import-btn" style="margin-top:4px;width:100%;padding:5px 0;font-size:11px;border:1px solid #1a2a40;background:#111d2e;color:#6a8aaa;border-radius:4px;cursor:pointer;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#6a8aaa'">&#128228; Import</button>
        </div>
    </div>
</div>

<div id="tooltip"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
